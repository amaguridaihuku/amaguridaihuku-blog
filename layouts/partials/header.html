<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "/css/main.css" | relURL }}">
  {{ if .Site.Params.googleAnalytics }}<script async src="https://www.googletagmanager.com/gtag/js?id={{ .Site.Params.googleAnalytics }}"></script>{{ end }}
</head>
<body>

{{ partial "age-gate.html" . }}

<header>
  <div class="header-inner">
    <a class="logo" href="{{ "/" | relURL }}">
      <span class="logo-icon">
        {{- if fileExists "static/images/logo.png" -}}
          <img src="/images/logo.png" alt="logo">
        {{- else if fileExists "static/images/logo.jpg" -}}
          <img src="/images/logo.jpg" alt="logo">
        {{- else if fileExists "static/images/logo.gif" -}}
          <img src="/images/logo.gif" alt="logo">
        {{- else -}}
          福
        {{- end -}}
      </span>
      <span class="logo-text">{{ .Site.Title }}</span>
    </a>
    <nav>
      <a href="{{ "/" | relURL }}"{{ if .IsHome }} class="active"{{ end }}>HOME</a>
      <a href="{{ "/categories/同人誌" | relURL }}"{{ if eq .Title "同人誌" }} class="active"{{ end }}>同人誌</a>
      <a href="{{ "/categories/漫画" | relURL }}"{{ if eq .Title "漫画" }} class="active"{{ end }}>漫画</a>
      <a href="{{ "/categories/イベント参加情報" | relURL }}"{{ if eq .Title "イベント参加情報" }} class="active"{{ end }}>イベント</a>
    </nav>
  </div>
</header>
